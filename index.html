<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>CyberPanel OS – Webowy system</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: #050510;
            --bg-alt: #0b0b1a;
            --accent: #00e5ff;
            --accent-soft: rgba(0, 229, 255, 0.2);
            --text: #f5f5f5;
            --text-dim: #a0a0b8;
            --danger: #ff4b81;
            --success: #4bffb3;
            --shadow-soft: 0 0 30px rgba(0,0,0,0.6);
        }

        [data-theme="light"] {
            --bg: #f5f7ff;
            --bg-alt: #ffffff;
            --accent: #0066ff;
            --accent-soft: rgba(0, 102, 255, 0.12);
            --text: #111322;
            --text-dim: #555a7a;
            --shadow-soft: 0 0 20px rgba(0,0,0,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #151530 0, #050510 55%, #000 100%);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
        }

        /* BOOT */

        #boot-screen {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at top, #101020 0, #020208 60%, #000 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            z-index: 1000;
        }

        .boot-logo {
            font-size: 42px;
            letter-spacing: 0.35em;
            text-indent: 0.35em;
            text-transform: uppercase;
            color: var(--accent);
            text-shadow: 0 0 18px rgba(0, 229, 255, 0.7);
        }

        .boot-subtitle {
            color: var(--text-dim);
            font-size: 14px;
        }

        .boot-loader {
            width: 260px;
            height: 6px;
            border-radius: 999px;
            background: rgba(255,255,255,0.06);
            overflow: hidden;
            position: relative;
            box-shadow: var(--shadow-soft);
        }

        .boot-loader::after {
            content: "";
            position: absolute;
            inset: 0;
            width: 40%;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            animation: load 1.6s infinite;
        }

        @keyframes load {
            0% { transform: translateX(-120%); }
            100% { transform: translateX(220%); }
        }

        .hidden {
            display: none !important;
        }

        /* DESKTOP */

        #desktop {
            position: relative;
            width: 100vw;
            height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(0,229,255,0.18), transparent 55%),
                radial-gradient(circle at bottom right, rgba(255,75,129,0.18), transparent 55%),
                linear-gradient(135deg, #050510, #050510 40%, #020208 100%);
        }

        /* TASKBAR */

        #taskbar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 42px;
            background: rgba(3,3,10,0.92);
            border-top: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            padding: 0 8px;
            gap: 8px;
            backdrop-filter: blur(16px);
        }

        .taskbar-btn {
            border: none;
            outline: none;
            background: rgba(255,255,255,0.04);
            color: var(--text);
            width: 30px;
            height: 30px;
            border-radius: 8px;
            display: grid;
            place-items: center;
            cursor: pointer;
            transition: 0.15s ease;
        }

        .taskbar-btn:hover {
            background: rgba(255,255,255,0.12);
            transform: translateY(-1px);
        }

        #taskbar-apps {
            display: flex;
            align-items: center;
            gap: 4px;
            flex: 1;
        }

        .taskbar-item {
            min-width: 90px;
            max-width: 180px;
            padding: 4px 10px;
            border-radius: 8px;
            background: rgba(255,255,255,0.04);
            color: var(--text-dim);
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.15s ease;
        }

        .taskbar-item.active {
            background: rgba(0,229,255,0.12);
            border-color: rgba(0,229,255,0.6);
            color: var(--text);
        }

        #taskbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #clock {
            font-size: 12px;
            color: var(--text-dim);
        }

        /* START MENU */

        #start-menu {
            position: absolute;
            bottom: 46px;
            left: 8px;
            width: 280px;
            background: rgba(5,5,20,0.96);
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 10px 10px 12px;
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(18px);
        }

        .start-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 6px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 8px;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--accent), var(--danger));
            display: grid;
            place-items: center;
            font-weight: 700;
            color: #fff;
            font-size: 16px;
        }

        .user-name {
            font-size: 14px;
        }

        .user-status {
            font-size: 11px;
            color: var(--text-dim);
        }

        .start-section {
            margin-bottom: 8px;
        }

        .start-section h3 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-dim);
            margin-bottom: 4px;
        }

        .app-list {
            list-style: none;
        }

        .app-list li {
            font-size: 13px;
            padding: 6px 8px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.12s ease;
        }

        .app-list li:hover {
            background: rgba(255,255,255,0.06);
            transform: translateX(2px);
        }

        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .quick-actions button {
            flex: 1 1 48%;
            border-radius: 8px;
            border: none;
            padding: 6px 8px;
            font-size: 11px;
            cursor: pointer;
            background: rgba(255,255,255,0.04);
            color: var(--text-dim);
            transition: 0.12s ease;
        }

        .quick-actions button:hover {
            background: rgba(0,229,255,0.16);
            color: var(--text);
        }

        /* WINDOWS */

        #windows {
            position: absolute;
            inset: 0;
        }

        .window {
            position: absolute;
            min-width: 320px;
            min-height: 200px;
            max-width: 80vw;
            max-height: 80vh;
            background: var(--bg-alt);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: var(--shadow-soft);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .window-header {
            height: 32px;
            display: flex;
            align-items: center;
            padding: 0 8px;
            gap: 8px;
            background: linear-gradient(90deg, rgba(0,229,255,0.18), transparent);
            cursor: grab;
        }

        .window-header-title {
            font-size: 13px;
            color: var(--text-dim);
            flex: 1;
        }

        .window-controls {
            display: flex;
            gap: 4px;
        }

        .window-btn {
            width: 16px;
            height: 16px;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            background: rgba(255,255,255,0.12);
        }

        .window-btn.close { background: var(--danger); }
        .window-btn.min { background: #f5c84c; }
        .window-btn.max { background: #4bffb3; }

        .window-body {
            flex: 1;
            padding: 8px;
            font-size: 13px;
            color: var(--text);
            overflow: auto;
        }

        /* TERMINAL */

        .terminal {
            background: #050510;
            color: #00ff9c;
            font-family: "Fira Code", monospace;
            font-size: 13px;
            padding: 6px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .terminal-output {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 4px;
        }

        .terminal-line {
            white-space: pre-wrap;
        }

        .terminal-input-row {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .terminal-prompt {
            color: #00e5ff;
        }

        .terminal-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #00ff9c;
        }

        /* NOTES */

        .notes-area {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(0,0,0,0.35);
            padding: 8px;
            color: var(--text);
            resize: none;
        }

        /* BROWSER MOCK */

        .browser-bar {
            display: flex;
            gap: 6px;
            margin-bottom: 6px;
        }

        .browser-url {
            flex: 1;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(0,0,0,0.35);
            padding: 4px 10px;
            font-size: 12px;
            color: var(--text-dim);
        }

        .browser-content {
            font-size: 12px;
            color: var(--text-dim);
        }

        /* WIDGETS */

        #widgets {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .widget {
            width: 180px;
            padding: 8px;
            border-radius: 12px;
            background: rgba(5,5,20,0.9);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--text);
            font-size: 12px;
            box-shadow: var(--shadow-soft);
        }

        .widget-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-dim);
            margin-bottom: 4px;
        }

        /* SCROLLBARS */

        *::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        *::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.18);
            border-radius: 999px;
        }
    </style>
</head>
<body>

<div id="boot-screen">
    <div class="boot-logo">CYBERPANEL OS</div>
    <div class="boot-subtitle">Webowy system operacyjny</div>
    <div class="boot-loader"></div>
</div>

<div id="desktop" class="hidden">
    <div id="taskbar">
        <button id="start-btn" class="taskbar-btn">⚡</button>
        <div id="taskbar-apps"></div>
        <div id="taskbar-right">
            <button id="theme-toggle" class="taskbar-btn">🌓</button>
            <span id="clock"></span>
        </div>
    </div>

    <div id="start-menu" class="hidden">
        <div class="start-header">
            <div class="avatar">A</div>
            <div>
                <div class="user-name">Antek</div>
                <div class="user-status">CyberPanel User</div>
            </div>
        </div>
        <div class="start-section">
            <h3>Aplikacje</h3>
            <ul class="app-list">
                <li data-app="terminal">> Terminal</li>
                <li data-app="notes">📝 Notatnik</li>
                <li data-app="browser">🌐 Przeglądarka</li>
            </ul>
        </div>
        <div class="start-section">
            <h3>Szybkie akcje</h3>
            <div class="quick-actions">
                <button data-action="clear-windows">Zamknij wszystkie okna</button>
                <button data-action="spawn-widgets">Dodaj widgety</button>
            </div>
        </div>
    </div>

    <div id="widgets"></div>
    <div id="windows"></div>
</div>

<script>
    const desktop = document.getElementById("desktop");
    const windowsContainer = document.getElementById("windows");
    const widgetsContainer = document.getElementById("widgets");
    const startBtn = document.getElementById("start-btn");
    const startMenu = document.getElementById("start-menu");
    const taskbarApps = document.getElementById("taskbar-apps");
    const clockEl = document.getElementById("clock");
    const themeToggle = document.getElementById("theme-toggle");

    let zIndexCounter = 10;
    let windowIdCounter = 0;
    const openWindows = new Map();

    window.addEventListener("load", () => {
        setTimeout(() => {
            document.getElementById("boot-screen").classList.add("hidden");
            desktop.classList.remove("hidden");
        }, 1500);

        initClock();
        initStartMenu();
        initTheme();
        spawnDefaultWidgets();
    });

    function initClock() {
        const update = () => {
            const d = new Date();
            clockEl.textContent = d.toLocaleTimeString("pl-PL", {
                hour: "2-digit",
                minute: "2-digit",
                second: "2-digit"
            });
        };
        update();
        setInterval(update, 1000);
    }

    function initStartMenu() {
        startBtn.addEventListener("click", () => {
            startMenu.classList.toggle("hidden");
        });

        document.addEventListener("click", e => {
            if (!startMenu.contains(e.target) && e.target !== startBtn) {
                startMenu.classList.add("hidden");
            }
        });

        startMenu.querySelectorAll(".app-list li").forEach(li => {
            li.addEventListener("click", () => {
                openApp(li.dataset.app);
                startMenu.classList.add("hidden");
            });
        });

        startMenu.querySelectorAll(".quick-actions button").forEach(btn => {
            btn.addEventListener("click", () => {
                const action = btn.dataset.action;
                if (action === "clear-windows") closeAllWindows();
                if (action === "spawn-widgets") spawnDefaultWidgets(true);
            });
        });
    }

    function initTheme() {
        const saved = localStorage.getItem("cp-theme");
        if (saved === "light") {
            document.documentElement.setAttribute("data-theme", "light");
        }
        themeToggle.addEventListener("click", () => {
            const isLight = document.documentElement.getAttribute("data-theme") === "light";
            document.documentElement.setAttribute("data-theme", isLight ? "dark" : "light");
            localStorage.setItem("cp-theme", isLight ? "dark" : "light");
        });
    }

    function openApp(app) {
        if (app === "terminal") return createTerminalWindow();
        if (app === "notes") return createNotesWindow();
        if (app === "browser") return createBrowserWindow();
    }

    function createWindow(title, icon = "●", width = 420, height = 260) {
        const id = `win-${++windowIdCounter}`;
        const win = document.createElement("div");
        win.className = "window";
        win.style.width = width + "px";
        win.style.height = height + "px";
        win.style.left = 60 + windowIdCounter * 12 + "px";
        win.style.top = 40 + windowIdCounter * 10 + "px";
        win.dataset.id = id;

        const header = document.createElement("div");
        header.className = "window-header";

        const iconEl = document.createElement("span");
        iconEl.textContent = icon;

        const titleEl = document.createElement("div");
        titleEl.className = "window-header-title";
        titleEl.textContent = title;

        const controls = document.createElement("div");
        controls.className = "window-controls";

        const btnClose = document.createElement("button");
        btnClose.className = "window-btn close";

        const btnMin = document.createElement("button");
        btnMin.className = "window-btn min";

        const btnMax = document.createElement("button");
        btnMax.className = "window-btn max";

        controls.append(btnMin, btnMax, btnClose);
        header.append(iconEl, titleEl, controls);

        const body = document.createElement("div");
        body.className = "window-body";

        win.append(header, body);
        windowsContainer.appendChild(win);

        makeDraggable(win, header);
        focusWindow(win);

        btnClose.addEventListener("click", () => closeWindow(id));
        btnMin.addEventListener("click", () => minimizeWindow(id));
        btnMax.addEventListener("click", () => maximizeWindow(id));

        const taskItem = document.createElement("div");
        taskItem.className = "taskbar-item active";
        taskItem.dataset.id = id;
        taskItem.innerHTML = `<span>${icon}</span><span>${title}</span>`;
        taskItem.addEventListener("click", () => {
            if (win.classList.contains("hidden")) {
                win.classList.remove("hidden");
                focusWindow(win);
                taskItem.classList.add("active");
            } else {
                win.classList.add("hidden");
                taskItem.classList.remove("active");
            }
        });
        taskbarApps.appendChild(taskItem);

        openWindows.set(id, { win, taskItem, maximized: false });

        return body;
    }

    function focusWindow(win) {
        zIndexCounter += 1;
        win.style.zIndex = zIndexCounter;
    }

    function closeWindow(id) {
        const data = openWindows.get(id);
        if (!data) return;
        data.win.remove();
        data.taskItem.remove();
        openWindows.delete(id);
    }

    function minimizeWindow(id) {
        const data = openWindows.get(id);
        if (!data) return;
        data.win.classList.add("hidden");
        data.taskItem.classList.remove("active");
    }

    function maximizeWindow(id) {
        const data = openWindows.get(id);
        if (!data) return;
        const win = data.win;
        if (!data.maximized) {
            data.prevRect = {
                left: win.style.left,
                top: win.style.top,
                width: win.style.width,
                height: win.style.height
            };
            win.style.left = "10px";
            win.style.top = "10px";
            win.style.width = "calc(100vw - 20px)";
            win.style.height = "calc(100vh - 60px)";
            data.maximized = true;
        } else {
            win.style.left = data.prevRect.left;
            win.style.top = data.prevRect.top;
